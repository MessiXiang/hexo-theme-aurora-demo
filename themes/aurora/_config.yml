# Aurora Theme Configuration
# A premium aviation-themed Hexo theme

# Navigation Menu
menu:
  Home: /
  Archives: /archives
  Categories: /categories
  Tags: /tags
  Search: /search

# Site branding
logo_text: "FLIGHT LOG"
logo_icon: "plane"
subtitle: "探索无垠天空"

# Author info
author:
  name: Messerschmitt.X
  handle: "@MessiXiang"
  avatar_emoji: "🧑‍🚀"
